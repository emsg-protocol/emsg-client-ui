<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EMSG Client UI</title>
  </head>
  <body>
    <div id="root"></div>
    <script src="/wasm_exec.js"></script>
    <script>
      const go = new Go();
      WebAssembly.instantiateStreaming(fetch('/emsg.wasm'), go.importObject)
        .then(result => { go.run(result.instance); window.__emsgWasmReady = true; })
        .catch(err => { window.__emsgWasmError = err.message; });
    </script>
    <script type="module" src="/src/wasm-init.ts"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
